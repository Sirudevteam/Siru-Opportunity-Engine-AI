services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siru
      POSTGRES_PASSWORD: siru
      POSTGRES_DB: siru_opportunity_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siru -d siru_opportunity_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: siru
      MINIO_ROOT_PASSWORD: siru-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=INFO
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:

